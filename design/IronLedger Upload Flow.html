<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>IronLedger — Upload Flow</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Source+Serif+4:ital,opsz,wght@0,8..60,300;0,8..60,600;1,8..60,300;1,8..60,400&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<style>
:root {
  --neutral-50: #FAFAF8; --neutral-100: #F4F3F0; --neutral-200: #E9E8E4;
  --neutral-300: #D5D3CE; --neutral-400: #BAB8B2; --neutral-500: #9A9892;
  --neutral-600: #787670; --neutral-700: #5A5853; --neutral-900: #252421;
  --amber-50: #FFF8ED; --amber-100: #FFEECE; --amber-200: #FEDA9A;
  --amber-400: #FBA12A; --amber-500: #F08408; --amber-600: #C46600; --amber-700: #9A4D00;
  --emerald-50: #EDFAF3; --emerald-100: #D1F4E4; --emerald-200: #A3E8CA;
  --emerald-300: #68D4A8; --emerald-400: #34BB83; --emerald-500: #16A066;
  --emerald-600: #0F7F50; --emerald-700: #0A613C;
  --violet-50: #F3F1FD; --violet-100: #E5DFFB; --violet-200: #CABEF7;
  --violet-300: #A897F0; --violet-400: #8570E6; --violet-500: #6651D4;
  --violet-600: #4F3DAE; --violet-700: #3A2C87;
  --canvas: #FAFAF8; --surface: #FFFFFF;
  --border: #E9E8E4; --border-strong: #D5D3CE;
  --text-primary: #252421; --text-secondary: #787670; --text-tertiary: #9A9892;
  --shadow-sm: 0 2px 6px oklch(0.14 0.01 60 / 0.08), 0 1px 2px oklch(0.14 0.01 60 / 0.04);
  --shadow-md: 0 4px 16px oklch(0.14 0.01 60 / 0.10), 0 2px 4px oklch(0.14 0.01 60 / 0.05);
  --shadow-lg: 0 8px 32px oklch(0.14 0.01 60 / 0.12);
  --shadow-amber: 0 4px 20px oklch(0.68 0.17 54 / 0.30);
  --shadow-emerald: 0 6px 28px oklch(0.60 0.16 152 / 0.28);
  --shadow-violet: 0 4px 20px oklch(0.58 0.16 282 / 0.24);
  --ease-out: cubic-bezier(0.16, 1, 0.3, 1);
  --ease-spring: cubic-bezier(0.34, 1.56, 0.64, 1);
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; }
body {
  font-family: 'Inter', sans-serif;
  background: var(--canvas);
  color: var(--text-primary);
  line-height: 1.5;
  -webkit-font-smoothing: antialiased;
}

/* ── KEYFRAMES ── */
@keyframes flowRight {
  from { transform: translateX(-280px); opacity: 0; }
  5%   { opacity: 1; }
  95%  { opacity: 1; }
  to   { transform: translateX(110vw); opacity: 0; }
}
@keyframes floatUp {
  0%   { transform: translateY(0) scale(1); opacity: 0; }
  8%   { opacity: 1; }
  90%  { opacity: 0.6; }
  100% { transform: translateY(-100vh) scale(0.5); opacity: 0; }
}
@keyframes stepPulse {
  0%   { box-shadow: 0 0 0 0 oklch(0.58 0.16 282 / 0.35); }
  70%  { box-shadow: 0 0 0 8px oklch(0.58 0.16 282 / 0); }
  100% { box-shadow: 0 0 0 0 oklch(0.58 0.16 282 / 0); }
}
@keyframes messageIn {
  from { opacity: 0; transform: translateY(6px); }
  to   { opacity: 1; transform: translateY(0); }
}
@keyframes cardReveal {
  from { opacity: 0; transform: translateY(20px); }
  to   { opacity: 1; transform: translateY(0); }
}
@keyframes cleanCircleExpand {
  0%   { transform: scale(0); opacity: 0; }
  60%  { transform: scale(1.08); opacity: 1; }
  80%  { transform: scale(0.97); }
  100% { transform: scale(1); opacity: 1; }
}
@keyframes cleanCheckIn {
  0%   { opacity: 0; transform: scale(0.4); }
  60%  { transform: scale(1.1); opacity: 1; }
  100% { transform: scale(1); opacity: 1; }
}
@keyframes cleanRingPulse {
  0%   { transform: scale(1); opacity: 0.4; }
  100% { transform: scale(1.5); opacity: 0; }
}
@keyframes shimmerSweep {
  from { background-position: -200% center; }
  to   { background-position: 200% center; }
}
@keyframes progressFill {
  from { width: 0%; }
}
@keyframes uploadProg {
  from { transform: scaleX(0); }
  to   { transform: scaleX(1); }
}
@keyframes connectorFill {
  from { height: 0%; }
  to   { height: 100%; }
}
@keyframes fadeSlideUp {
  from { opacity: 0; transform: translateY(16px); }
  to   { opacity: 1; transform: translateY(0); }
}
@keyframes dotBlink {
  0%, 100% { opacity: 0.3; }
  50% { opacity: 1; }
}
@keyframes spin {
  to { transform: rotate(360deg); }
}
@keyframes dragPulse {
  0%, 100% { border-color: var(--amber-400); background: var(--amber-50); }
  50% { border-color: var(--amber-500); background: var(--amber-100); }
}

/* ── LAYOUT ── */
#root { min-height: 100vh; display: flex; flex-direction: column; }
.app-shell {
  flex: 1;
  display: flex;
  flex-direction: column;
  min-height: 100vh;
}
.stage {
  flex: 1;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 40px 24px;
  position: relative;
  overflow: hidden;
}

/* ── DEMO NAV ── */
.demo-nav {
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  padding: 10px 24px;
  display: flex;
  align-items: center;
  gap: 6px;
  overflow-x: auto;
  scrollbar-width: none;
  position: sticky;
  top: 0;
  z-index: 200;
}
.demo-nav::-webkit-scrollbar { display: none; }
.demo-nav-label {
  font-family: 'JetBrains Mono', monospace;
  font-size: 10px;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  color: var(--text-tertiary);
  margin-right: 8px;
  white-space: nowrap;
}
.demo-pill {
  font-size: 11px;
  font-weight: 500;
  padding: 5px 12px;
  border-radius: 999px;
  border: 1px solid var(--border);
  background: transparent;
  color: var(--text-secondary);
  cursor: pointer;
  white-space: nowrap;
  transition: all 140ms var(--ease-out);
  font-family: 'Inter', sans-serif;
}
.demo-pill:hover { background: var(--neutral-100); color: var(--text-primary); }
.demo-pill.active { background: var(--violet-50); color: var(--violet-700); border-color: var(--violet-200); }

/* ── SHARED CARD ── */
.upload-card {
  background: var(--surface);
  border-radius: 16px;
  box-shadow: var(--shadow-lg);
  width: 100%;
  position: relative;
  overflow: hidden;
}

/* ── DROPZONE EMPTY ── */
.dropzone-wrap { max-width: 540px; width: 100%; }
.dz-wordmark {
  font-family: 'Source Serif 4', serif;
  font-size: 13px;
  font-weight: 600;
  color: var(--text-tertiary);
  letter-spacing: 0.02em;
  text-align: center;
  margin-bottom: 28px;
  text-transform: uppercase;
  font-size: 11px;
  letter-spacing: 0.12em;
}
.dropzone {
  border: 2px dashed var(--border-strong);
  border-radius: 14px;
  padding: 52px 40px 44px;
  text-align: center;
  cursor: pointer;
  transition: all 180ms var(--ease-out);
  background: var(--surface);
  position: relative;
}
.dropzone:hover, .dropzone.over {
  border-color: var(--amber-400);
  background: var(--amber-50);
}
.dropzone.over {
  animation: dragPulse 1s ease-in-out infinite;
}
.dz-icon {
  width: 56px; height: 56px;
  margin: 0 auto 20px;
  display: flex; align-items: center; justify-content: center;
  background: var(--neutral-100);
  border-radius: 14px;
  transition: all 180ms var(--ease-out);
}
.dropzone:hover .dz-icon, .dropzone.over .dz-icon {
  background: var(--amber-100);
}
.dz-headline {
  font-family: 'Source Serif 4', serif;
  font-size: 28px;
  font-weight: 600;
  letter-spacing: -0.025em;
  color: var(--text-primary);
  margin-bottom: 8px;
  line-height: 1.15;
}
.dz-sub {
  font-size: 14px;
  color: var(--text-secondary);
  margin-bottom: 24px;
  line-height: 1.5;
}
.dz-badges {
  display: flex;
  gap: 8px;
  justify-content: center;
  margin-bottom: 20px;
}
.dz-badge {
  display: flex;
  align-items: center;
  gap: 5px;
  padding: 5px 12px;
  border-radius: 6px;
  font-size: 12px;
  font-weight: 600;
  font-family: 'JetBrains Mono', monospace;
  border: 1px solid;
}
.dz-badge-excel { background: #F0FDF4; color: #166534; border-color: #A3E8CA; }
.dz-badge-csv   { background: #EFF6FF; color: #1E40AF; border-color: #BFDBFE; }
.dz-click-hint {
  font-size: 12px;
  color: var(--text-tertiary);
}
.dz-click-hint span { color: var(--amber-600); font-weight: 500; cursor: pointer; }
.dz-click-hint span:hover { text-decoration: underline; }
.dz-drag-overlay {
  position: absolute;
  inset: 0;
  border-radius: 12px;
  pointer-events: none;
  display: flex;
  align-items: center;
  justify-content: center;
  opacity: 0;
  transition: opacity 180ms;
}
.dropzone.over .dz-drag-overlay { opacity: 1; }

/* ── DROPZONE WITH FILES ── */
.dz-files-card { max-width: 540px; width: 100%; }
.dz-files-header {
  padding: 24px 24px 0;
  margin-bottom: 16px;
}
.dz-files-title {
  font-size: 15px;
  font-weight: 600;
  color: var(--text-primary);
  margin-bottom: 2px;
}
.dz-files-sub { font-size: 13px; color: var(--text-secondary); }
.file-list { padding: 0 16px; display: flex; flex-direction: column; gap: 6px; }
.file-card {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 12px 12px;
  background: var(--canvas);
  border: 1px solid var(--border);
  border-radius: 10px;
  transition: all 140ms var(--ease-out);
}
.file-card:hover { border-color: var(--border-strong); box-shadow: var(--shadow-sm); }
.file-icon-wrap {
  width: 36px; height: 36px;
  border-radius: 8px;
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
}
.file-icon-excel { background: #DCFCE7; }
.file-icon-csv   { background: #DBEAFE; }
.file-name {
  font-size: 13px; font-weight: 500;
  color: var(--text-primary);
  flex: 1;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}
.file-size {
  font-family: 'JetBrains Mono', monospace;
  font-size: 11px;
  color: var(--text-tertiary);
  white-space: nowrap;
}
.file-remove {
  width: 24px; height: 24px;
  border-radius: 6px;
  border: none;
  background: none;
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  color: var(--text-tertiary);
  transition: all 100ms var(--ease-out);
  flex-shrink: 0;
}
.file-remove:hover { background: #FEF0F0; color: #B91C1C; }
.dz-add-more {
  margin: 10px 16px 0;
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 10px 12px;
  border: 1.5px dashed var(--border-strong);
  border-radius: 10px;
  cursor: pointer;
  transition: all 140ms var(--ease-out);
  color: var(--text-tertiary);
  font-size: 13px;
}
.dz-add-more:hover { border-color: var(--amber-400); color: var(--amber-700); background: var(--amber-50); }
.dz-actions {
  padding: 16px;
  border-top: 1px solid var(--border);
  margin-top: 16px;
  display: flex;
  gap: 8px;
  align-items: center;
}
.btn-primary {
  flex: 1;
  display: flex; align-items: center; justify-content: center; gap: 8px;
  padding: 12px 20px;
  background: var(--amber-500);
  color: white;
  font-size: 14px; font-weight: 600;
  border-radius: 8px;
  border: none; cursor: pointer;
  font-family: 'Inter', sans-serif;
  transition: all 140ms var(--ease-out);
  box-shadow: var(--shadow-sm);
}
.btn-primary:hover { background: var(--amber-600); box-shadow: var(--shadow-amber); transform: scale(1.012); }
.btn-primary:active { transform: scale(0.97); }
.btn-secondary {
  display: flex; align-items: center; justify-content: center; gap: 6px;
  padding: 12px 16px;
  background: var(--surface);
  color: var(--text-secondary);
  font-size: 13px; font-weight: 500;
  border-radius: 8px;
  border: 1px solid var(--border-strong);
  cursor: pointer;
  font-family: 'Inter', sans-serif;
  transition: all 140ms var(--ease-out);
  white-space: nowrap;
}
.btn-secondary:hover { background: var(--canvas); color: var(--text-primary); box-shadow: var(--shadow-sm); }
.btn-secondary:active { transform: scale(0.97); }

/* ── UPLOADING STATE ── */
.uploading-wrap { max-width: 480px; width: 100%; }
.upload-header {
  padding: 28px 28px 20px;
  border-bottom: 1px solid var(--border);
}
.upload-title { font-size: 15px; font-weight: 600; color: var(--text-primary); margin-bottom: 2px; }
.upload-sub { font-size: 13px; color: var(--text-secondary); }
.upload-items { padding: 16px 20px; display: flex; flex-direction: column; gap: 14px; }
.upload-item { display: flex; flex-direction: column; gap: 6px; }
.upload-item-row { display: flex; align-items: center; justify-content: space-between; }
.upload-item-name { font-size: 13px; font-weight: 500; color: var(--text-primary); }
.upload-item-pct { font-family: 'JetBrains Mono', monospace; font-size: 11px; color: var(--text-tertiary); }
.upload-bar-track {
  height: 3px;
  background: var(--neutral-200);
  border-radius: 2px;
  overflow: hidden;
}
.upload-bar-fill {
  height: 100%;
  background: var(--amber-500);
  border-radius: 2px;
  transform-origin: left;
  animation: uploadProg linear forwards;
}

/* ── PROCESSING ── */
.processing-stage {
  position: relative;
  width: 100%;
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 40px 24px;
  background: linear-gradient(160deg, var(--violet-50) 0%, var(--canvas) 40%, var(--canvas) 70%, var(--violet-50) 100%);
  overflow: hidden;
}
.processing-card {
  position: relative;
  z-index: 10;
  background: var(--surface);
  border-radius: 20px;
  box-shadow: var(--shadow-lg), 0 0 0 1px var(--border);
  width: 100%;
  max-width: 500px;
  padding: 32px;
}
.proc-header { margin-bottom: 32px; }
.proc-eyebrow {
  font-family: 'JetBrains Mono', monospace;
  font-size: 10px;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: var(--violet-500);
  margin-bottom: 8px;
  display: flex;
  align-items: center;
  gap: 6px;
}
.proc-eyebrow-dot {
  width: 5px; height: 5px;
  border-radius: 50%;
  background: var(--violet-500);
  animation: dotBlink 1.4s ease-in-out infinite;
}
.proc-title {
  font-family: 'Source Serif 4', serif;
  font-size: 24px;
  font-weight: 600;
  letter-spacing: -0.02em;
  color: var(--text-primary);
  margin-bottom: 6px;
}
.proc-hint {
  font-size: 13px;
  color: var(--text-tertiary);
  display: flex;
  align-items: center;
  gap: 5px;
}
.proc-steps { display: flex; flex-direction: column; }
.proc-step {
  display: flex;
  gap: 14px;
  position: relative;
}
.proc-step-left {
  display: flex;
  flex-direction: column;
  align-items: center;
  flex-shrink: 0;
}
.proc-step-icon {
  width: 36px; height: 36px;
  border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  transition: all 300ms var(--ease-out);
  flex-shrink: 0;
  position: relative;
  z-index: 1;
}
.proc-step-icon.pending {
  background: var(--neutral-100);
  border: 1.5px solid var(--border);
}
.proc-step-icon.active {
  background: var(--violet-500);
  border: none;
  animation: stepPulse 1.8s ease-out infinite;
  box-shadow: var(--shadow-violet);
}
.proc-step-icon.done {
  background: var(--emerald-500);
  border: none;
}
.proc-connector {
  width: 2px;
  background: var(--border);
  flex: 1;
  min-height: 16px;
  position: relative;
  overflow: hidden;
  margin: 2px 0;
}
.proc-connector-fill {
  position: absolute;
  top: 0; left: 0; right: 0;
  background: var(--emerald-400);
  animation: connectorFill 400ms var(--ease-out) forwards;
}
.proc-step-body {
  padding-bottom: 24px;
  padding-top: 6px;
  flex: 1;
  min-height: 36px;
}
.proc-step:last-child .proc-step-body { padding-bottom: 0; }
.proc-step-label {
  font-size: 14px;
  font-weight: 600;
  line-height: 1;
  margin-bottom: 4px;
  transition: color 200ms;
}
.proc-step-label.pending { color: var(--text-tertiary); }
.proc-step-label.active  { color: var(--text-primary); }
.proc-step-label.done    { color: var(--emerald-700); }
.proc-microcopy-wrap {
  min-height: 20px;
  overflow: hidden;
}
.proc-microcopy {
  font-size: 13px;
  color: var(--violet-600);
  font-family: 'JetBrains Mono', monospace;
  animation: messageIn 220ms var(--ease-out) both;
}
.proc-done-note {
  font-size: 12px;
  color: var(--emerald-600);
  font-weight: 500;
}
.proc-footer {
  margin-top: 28px;
  padding-top: 20px;
  border-top: 1px solid var(--border);
  display: flex;
  align-items: center;
  justify-content: space-between;
}
.proc-time-hint {
  font-size: 12px;
  color: var(--text-tertiary);
  display: flex;
  align-items: center;
  gap: 6px;
}
.proc-skip {
  font-size: 12px;
  color: var(--text-tertiary);
  cursor: pointer;
  padding: 4px 10px;
  border-radius: 6px;
  border: 1px solid var(--border);
  background: none;
  font-family: 'Inter', sans-serif;
  transition: all 120ms;
}
.proc-skip:hover { color: var(--text-primary); background: var(--canvas); }

/* DATA FLOW BG */
.dataflow-bg {
  position: absolute;
  inset: 0;
  pointer-events: none;
  overflow: hidden;
  z-index: 0;
}

/* ── REVEAL — ANOMALIES ── */
.reveal-wrap { max-width: 700px; width: 100%; }
.reveal-header {
  background: var(--surface);
  border-radius: 16px 16px 0 0;
  padding: 24px 28px 20px;
  border-bottom: 1px solid var(--border);
}
.reveal-eyebrow {
  font-family: 'JetBrains Mono', monospace;
  font-size: 10px;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: var(--text-tertiary);
  margin-bottom: 8px;
}
.reveal-title {
  font-family: 'Source Serif 4', serif;
  font-size: 26px;
  font-weight: 600;
  letter-spacing: -0.02em;
  color: var(--text-primary);
  margin-bottom: 4px;
}
.reveal-meta { font-size: 13px; color: var(--text-secondary); }
.reveal-summary {
  display: flex;
  gap: 0;
  border-bottom: 1px solid var(--border);
  background: var(--surface);
}
.reveal-stat {
  flex: 1;
  padding: 16px 20px;
  border-right: 1px solid var(--border);
}
.reveal-stat:last-child { border-right: none; }
.reveal-stat-label { font-size: 11px; font-weight: 500; letter-spacing: 0.04em; text-transform: uppercase; color: var(--text-tertiary); margin-bottom: 4px; }
.reveal-stat-value { font-family: 'Source Serif 4', serif; font-size: 22px; font-weight: 600; letter-spacing: -0.02em; }
.reveal-stat-value.red { color: #B91C1C; }
.reveal-stat-value.amber { color: var(--amber-700); }
.reveal-stat-value.green { color: var(--emerald-600); }
.reveal-body { background: var(--canvas); padding: 16px 20px; border-radius: 0 0 16px 16px; }
.reveal-list-label {
  font-size: 11px; font-weight: 600; letter-spacing: 0.06em; text-transform: uppercase;
  color: var(--text-tertiary); margin-bottom: 12px;
}
.anomaly-list { display: flex; flex-direction: column; gap: 8px; }
.anomaly-row {
  display: flex;
  align-items: center;
  gap: 14px;
  padding: 14px 16px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 10px;
  cursor: pointer;
  transition: all 180ms var(--ease-out);

/* ── UPLOAD PROGRESS SIMULATION ── */
function useUploadProgress(active) {
  const [prog, setProg] = useState({0:0,1:0});
  const rafRef = useRef(null);
  const startRef = useRef(null);

  useEffect(() => {
    if (!active) { setProg({0:0,1:0}); return; }
    startRef.current = Date.now();
    const total = [1800, 2600];
    const tick = () => {
      const elapsed = Date.now() - startRef.current;
      setProg({
        0: Math.min(100, Math.round((elapsed / total[0]) * 100)),
        1: Math.min(100, Math.round(((elapsed - 400) / total[1]) * 100)),
      });
      if (elapsed < Math.max(...total) + 200) rafRef.current = requestAnimationFrame(tick);
    };
    rafRef.current = requestAnimationFrame(tick);
    return () => cancelAnimationFrame(rafRef.current);
  }, [active]);

  return prog;
}

/* ── PROCESSING ── */
function Processing({resultType, onComplete, autoPlay}) {
  const [activeStep, setActiveStep] = useState(0);
  const [done, setDone] = useState([]);
  const [msgIdx, setMsgIdx] = useState(0);
  const [msgKey, setMsgKey] = useState(0);
  const [elapsed, setElapsed] = useState(0);

  // Step advancement
  useEffect(() => {
    if (!autoPlay) return;
    if (activeStep >= STEPS.length) return;
    const t = setTimeout(() => {
      if (activeStep < STEPS.length - 1) {
        setDone(d => [...d, activeStep]);
        setActiveStep(s => s + 1);
        setMsgIdx(0); setMsgKey(k=>k+1);
      } else {
        setDone(d => [...d, activeStep]);
        setActiveStep(STEPS.length);
        setTimeout(() => onComplete(resultType), 800);
      }
    }, STEP_MS[activeStep]);
    return () => clearTimeout(t);
  }, [activeStep, autoPlay]);

  // Message cycling
  useEffect(() => {
    if (activeStep >= STEPS.length) return;
    const msgs = STEPS[activeStep].messages;
    if (msgIdx >= msgs.length - 1) return;
    const t = setInterval(() => {
      setMsgIdx(i => {
        if (i < msgs.length - 1) { setMsgKey(k=>k+1); return i+1; }
        return i;
      });
    }, MSG_MS);
    return () => clearInterval(t);
  }, [activeStep, msgIdx]);

  // Elapsed time display
  useEffect(() => {
    const t = setInterval(() => setElapsed(e=>e+1), 1000);
    return () => clearInterval(t);
  }, []);

  const getStepState = idx => {
    if (done.includes(idx)) return 'done';
    if (idx === activeStep && activeStep < STEPS.length) return 'active';
    return 'pending';
  };

  return (
    <div className="processing-stage">
      <DataFlowBg />
      <div className="processing-card">
        <div className="proc-header">
          <div className="proc-eyebrow">
            <span className="proc-eyebrow-dot"></span>
            IronLedger Agent · Running
          </div>
          <div className="proc-title">Analyzing your files.</div>
          <div className="proc-hint"><ClockIcon/> Usually under 2 minutes</div>
        </div>

        <div className="proc-steps">
          {STEPS.map((step, idx) => {
            const Icon = STEP_ICONS[idx];
            const state = getStepState(idx);
            const isLast = idx === STEPS.length - 1;
            const isDone = done.includes(idx);
            const isActive = state === 'active';
            const connFill = done.includes(idx);

            return (
              <div className="proc-step" key={step.key}>
                <div className="proc-step-left">
                  <div className={`proc-step-icon ${state}`}>
                    {isDone
                      ? <CheckIcon size={14} color="white" weight={2.2}/>
                      : <Icon color={isActive ? 'white' : 'var(--neutral-400)'}/>
                    }
                  </div>
                  {!isLast && (
                    <div className="proc-connector">
                      {isDone && <div className="proc-connector-fill"/>}
                    </div>
                  )}
                </div>
                <div className="proc-step-body">
                  <div className={`proc-step-label ${state}`}>{step.label}</div>
                  {isActive && (
                    <div className="proc-microcopy-wrap">
                      <div className="proc-microcopy" key={msgKey}>
                        {step.messages[msgIdx]}
                      </div>
                    </div>
                  )}
                  {isDone && (
                    <div className="proc-done-note">
                      {step.messages[step.messages.length-1]}
                    </div>
                  )}
                </div>
              </div>
            );
          })}
        </div>

        <div className="proc-footer">
          <div className="proc-time-hint">
            <div style={{width:8,height:8,borderRadius:'50%',background:'var(--violet-400)',opacity:.7}}></div>
            {elapsed < 10 ? 'Just started' : `${elapsed}s elapsed`}
          </div>
          <button className="proc-skip" onClick={()=>onComplete(resultType)}>
            Skip to result →
          </button>
        </div>
      </div>
    </div>
  );
}

/* ── APP ── */
function App() {
  const [view, setView] = useState('empty');
  const [files, setFiles] = useState(MOCK_FILES);
  const [tweaks, setTweaksState] = useState(TWEAK_DEFAULTS);
  const [tweaksOpen, setTweaksOpen] = useState(false);

  const setTweak = (key, val) => {
    const next = {...tweaks, [key]:val};
    setTweaksState(next);
    window.parent.postMessage({type:'__edit_mode_set_keys', edits:next},'*');
  };

  // Tweaks protocol
  useEffect(() => {
    const handler = ({data}) => {
      if (data?.type === '__activate_edit_mode')   setTweaksOpen(true);
      if (data?.type === '__deactivate_edit_mode') setTweaksOpen(false);
    };
    window.addEventListener('message', handler);
    window.parent.postMessage({type:'__edit_mode_available'},'*');
    return () => window.removeEventListener('message', handler);
  }, []);

  const needsFullHeight = view === 'processing' || view === 'reveal-clean';

  return (
    <div className="app-shell">
      {/* Demo nav */}
      <nav className="demo-nav">
        <span className="demo-nav-label">States</span>
        {STATES.map(s => (
          <button key={s.key} className={`demo-pill ${view===s.key?'active':''}`}
            onClick={()=>setView(s.key)}>{s.label}</button>
        ))}
      </nav>

      {/* Stage */}
      {needsFullHeight ? (
        view==='processing' ? (
          <Processing
            resultType={tweaks.resultType}
            autoPlay={tweaks.autoPlay}
            onComplete={rt => setView(`reveal-${rt}`)}
          />
        ) : (
          <RevealClean onReset={()=>setView('empty')}/>
        )
      ) : (
        <div className="stage">
          {view==='empty' && <DropzoneEmpty onFiles={f=>{setFiles(f);setView('files');}}/>}
          {view==='files' && <DropzoneFiles files={files} onUpload={()=>setView('uploading')} onBack={()=>setView('empty')}/>}
          {view==='uploading' && <Uploading files={files} onDone={()=>setView('processing')}/>}
          {view==='reveal-anomalies' && <RevealAnomalies onReset={()=>setView('empty')}/>}
          {view==='empty-dashboard' && <EmptyDashboard onUpload={()=>setView('empty')}/>}
        </div>
      )}

      <TweaksPanel tweaks={tweaks} setTweak={setTweak} open={tweaksOpen} onClose={()=>{setTweaksOpen(false);window.parent.postMessage({type:'__edit_mode_dismissed'},'*');}}/>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
