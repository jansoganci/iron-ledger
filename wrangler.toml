# Month Proof — Cloudflare Pages (static Vite app from frontend/)
# Used with: npx wrangler pages deploy (see project README or deploy docs)
#
# `name` is the default Cloudflare Pages project name when you omit --project-name.
# Build output: frontend/dist/ (Vite: npm run build with root = frontend/)
#
# VITE_* variables are NOT read by Cloudflare at runtime for a static Vite app — they
# are baked in at `npm run build`. Use frontend/.env.production (gitignored) or export
# them in the shell before building. See frontend/.env.example for variable names.

name = "monthproof"
compatibility_date = "2026-04-26"
